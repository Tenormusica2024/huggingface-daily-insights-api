name: Deploy GitHub Pages dashboard

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest CSV release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p docs/data
          gh release download --repo "${{ github.repository }}" --pattern "*.csv" --dir docs/data --clobber
          gh release view --repo "${{ github.repository }}" --json tagName,name,publishedAt,url > docs/data/release.json
          ls -lh docs/data

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
