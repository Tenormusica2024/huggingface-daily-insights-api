name: Daily AI Data Crawl

on:
  # Run daily at UTC 00:00 (JST 09:00)
  schedule:
    - cron: "0 0 * * *"
  # Manual trigger for debugging
  workflow_dispatch:

permissions:
  # Required for creating Releases (contents: write)
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          # Arena pickle parsing runs untrusted upstream pickle code; do not
          # leave a write-capable Git credential in the workspace.
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run HF crawl
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python src/crawl_hf.py

      - name: Run arXiv crawl
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python src/crawl_arxiv.py

      - name: Parse Arena pickle to JSON (no Supabase secrets)
        run: python src/crawl_arena.py --export-json arena_rankings_import.json

      - name: Import Arena rankings JSON
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python src/crawl_arena.py --import-json arena_rankings_import.json

      - name: Compute snapshot date
        id: snapshot
        # クロール完了後の UTC 日付をスナップショット日付として使用
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Export daily snapshot to CSV
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SNAPSHOT_DATE: ${{ steps.snapshot.outputs.date }}
        run: python src/export_daily_snapshot.py

      - name: Create GitHub Release with CSV assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: snapshot-${{ steps.snapshot.outputs.date }}
          name: Daily snapshot ${{ steps.snapshot.outputs.date }}
          body: |
            Daily data snapshot auto-generated by crawl pipeline.

            Tables included:
            - `models.csv` — HuggingFace models master (all-time)
            - `model_snapshots.csv` — per-day likes/downloads (last 30 days)
            - `papers.csv` — arXiv AI/ML papers (all-time)
            - `arena_rankings.csv` — LMArena ELO rankings (all-time)

            Source: <https://github.com/${{ github.repository }}>
          files: snapshots/${{ steps.snapshot.outputs.date }}/*.csv
          # 同タグで再実行された場合も既存 Release を上書き（workflow_dispatch での再実行に対応）
          make_latest: true
